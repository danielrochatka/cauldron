name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core
        run: pip install -e '.[dev]'

      - name: Install test fixture modules
        run: |
          pip install -e tests/fixtures/cauldron-fixture-alpha
          pip install -e tests/fixtures/cauldron-fixture-beta

      - name: Install Django modules
        run: |
          pip install -e packages/cauldron-django-state
          pip install -e packages/cauldron-django-auth
          pip install -e packages/cauldron-django-admin

      - name: Install content modules
        run: |
          pip install -e packages/cauldron-content
          pip install -e packages/cauldron-workspace-flatfile
          pip install -e packages/cauldron-cms-flatfile

      - name: Test (core)
        run: pytest tests/ -v

      - name: Test (cauldron-django-state)
        run: pytest packages/cauldron-django-state/tests/ -v

      - name: Test (cauldron-django-auth)
        run: pytest packages/cauldron-django-auth/tests/ -v

      - name: Test (cauldron-django-admin)
        run: pytest packages/cauldron-django-admin/tests/ -v

      - name: Test (cauldron-content)
        run: pytest packages/cauldron-content/tests/ -v

      - name: Test (cauldron-workspace-flatfile)
        run: pytest packages/cauldron-workspace-flatfile/tests/ -v

      - name: Test (cauldron-cms-flatfile)
        run: pytest packages/cauldron-cms-flatfile/tests/ -v

      - name: Django state consumer check
        working-directory: examples/django-state-consumer
        run: python manage.py check

      - name: Django state consumer migrate
        working-directory: examples/django-state-consumer
        run: python manage.py migrate --noinput

      - name: Django state consumer status
        working-directory: examples/django-state-consumer
        run: python manage.py cauldron_state_status

      - name: Django state consumer status (JSON)
        working-directory: examples/django-state-consumer
        run: python manage.py cauldron_state_status --json

      - name: Django consumer check (editable)
        working-directory: examples/django-consumer
        run: python manage.py check

      - name: Build core wheel
        run: python -m build

      - name: Build Django module wheels
        run: |
          python -m build packages/cauldron-django-state
          python -m build packages/cauldron-django-auth
          python -m build packages/cauldron-django-admin

      - name: Build content module wheels
        run: |
          python -m build packages/cauldron-content
          python -m build packages/cauldron-workspace-flatfile
          python -m build packages/cauldron-cms-flatfile

      - name: Install core wheel in clean environment
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/pip install dist/cauldron-*.whl

      - name: Django consumer check (wheel)
        working-directory: examples/django-consumer
        run: ../../.venv-wheel/bin/python manage.py check

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/cauldron-astro/package-lock.json

      - name: Install
        working-directory: packages/cauldron-astro
        run: npm ci

      - name: Build
        working-directory: packages/cauldron-astro
        run: npm run build

      - name: Verify committed dist matches source
        run: git diff --exit-code packages/cauldron-astro/dist/

      - name: Typecheck
        working-directory: packages/cauldron-astro
        run: npm run typecheck

      - name: Test (cauldron-astro)
        working-directory: packages/cauldron-astro
        run: npm test

      - name: Pack integration artifact
        working-directory: packages/cauldron-astro
        run: |
          TARBALL=$(npm pack 2>/dev/null)
          echo "CAULDRON_ASTRO_TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Install Astro consumer dependencies
        working-directory: examples/astro-consumer
        run: npm install

      - name: Install packed integration into consumer
        working-directory: examples/astro-consumer
        run: npm install --no-save "../../packages/cauldron-astro/$CAULDRON_ASTRO_TARBALL"

      - name: Build Astro consumer
        working-directory: examples/astro-consumer
        run: npm run build

      - name: Install Astro flat-file example dependencies
        working-directory: examples/astro-flatfile-cms
        run: npm install

      - name: Install packed integration into flat-file example
        working-directory: examples/astro-flatfile-cms
        run: npm install --no-save "../../packages/cauldron-astro/$CAULDRON_ASTRO_TARBALL"

      - name: Build Astro flat-file example
        working-directory: examples/astro-flatfile-cms
        run: npm run build

      - name: Verify draft content excluded from production build
        run: |
          if grep -qir "draft" examples/astro-flatfile-cms/dist/; then
            echo "ERROR: draft content leaked into production build"
            exit 1
          fi

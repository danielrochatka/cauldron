name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e '.[dev]'

      - name: Test
        run: pytest

      - name: Django consumer check
        working-directory: examples/django-consumer
        run: python manage.py check

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/cauldron-astro/package-lock.json

      - name: Install
        working-directory: packages/cauldron-astro
        run: npm ci

      - name: Build
        working-directory: packages/cauldron-astro
        run: npm run build

      - name: Typecheck
        working-directory: packages/cauldron-astro
        run: npm run typecheck

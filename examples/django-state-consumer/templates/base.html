<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cauldron Django State Consumer{% endblock %}</title>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            Welcome, {{ user.username }} |
            <a href="{% url 'cauldron_auth:logout' %}">Logout</a>
            {% if user.is_staff %}
                | <a href="/admin/">Admin</a>
            {% endif %}
        {% else %}
            <a href="{% url 'cauldron_auth:login' %}">Login</a>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>

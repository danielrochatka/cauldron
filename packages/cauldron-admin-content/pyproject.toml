[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cauldron-admin-content"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "cauldron>=0.1.0",
    "cauldron-content-operations>=0.1.0",
    "cauldron-django-admin>=0.1.0",
    "django>=4.2",
]

[project.entry-points."cauldron.modules"]
"cauldron.admin.content" = "cauldron_admin_content.module:module"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src", "../../src", "../.."]
addopts = "-ra"
testpaths = ["tests"]

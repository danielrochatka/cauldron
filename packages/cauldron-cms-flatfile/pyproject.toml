[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cauldron-cms-flatfile"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "cauldron>=0.1.0",
  "cauldron-content>=0.1.0",
  "python-frontmatter>=1.0",
  "jsonschema>=4.22",
  "PyYAML>=6.0",
]

[project.entry-points."cauldron.modules"]
"cauldron.cms.flatfile" = "cauldron_cms_flatfile.module:module"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = []

[tool.pytest.ini_options]
pythonpath = ["src", "../../src", "../.."]
addopts = "-ra"

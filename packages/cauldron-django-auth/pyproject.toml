[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cauldron-django-auth"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["cauldron>=0.1.0", "cauldron-django-state>=0.1.0"]

[project.entry-points."cauldron.modules"]
"cauldron.django.auth" = "cauldron_django_auth.module:module"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
cauldron_django_auth = ["templates/registration/*.html"]

[tool.pytest.ini_options]
pythonpath = ["src", "../../src", "../.."]
addopts = "-ra"

<!DOCTYPE html>
<html>
<head><title>Set New Password</title></head>
<body>
<h1>Set New Password</h1>
{% if validlink %}
<form method="post">{% csrf_token %}{{ form.as_p }}<button type="submit">Set password</button></form>
{% else %}
<p>This password reset link is invalid or has expired.</p>
{% endif %}
</body>
</html>
